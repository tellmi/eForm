<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>eForm Viewer (Prototype)</title>

<link rel="icon" type="image/svg+xml" href="../../icon/eForm_min.svg">

<style>

/* ---------- layout ---------- */

body {
  font-family: sans-serif;
  margin: 0;
  background: #e9ecef;
}

h2 {
  margin: 20px;
}

/* ---------- toolbar ---------- */

#toolbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;

  background: white;
  padding: 12px 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);

  display: flex;
  gap: 10px;
  align-items: center;

  z-index: 1000;
}

/* ---------- viewer ---------- */

#container {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
  gap: 30px;
}

/* ---------- page ---------- */

.page {
  background: white;
  padding: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

/* ---------- SVG scaling ---------- */

.page svg {
  width: 850px;
  max-width: 100%;
  height: auto;
  display: block;
}

/* ---------- field styling ---------- */

/* base field behavior */
[data-eform-field] {
  pointer-events: all;
  stroke: black;
  cursor: text;
}

/* hover (all fields) */
[data-eform-field]:hover {
  stroke: #0066ff;
  fill: rgba(0, 102, 255, 0.08);
}

/* computed fields */
[data-eform-computed] {
  stroke: #999;
  stroke-dasharray: 4 2;
}

/* sliders: invisible placeholders */
[data-eform-field].slider-field {
  fill-opacity: 0;
  stroke: transparent;
  cursor: pointer;
}

/* optional slider hover */
[data-eform-field].slider-field:hover {
  fill: rgba(0, 102, 255, 0.08);
  opacity: 0.9;
}

/* active field */
[data-eform-field].active {
  stroke: #ff6600;
}

/* labels */
[data-eform-label] {
  pointer-events: none;
  user-select: none;
  fill: #000;
  font-size: 14px;
}

/* field decorations */
.field-id {
  font-size: 3px;
  fill: #777;
  letter-spacing: 0.2px;
}

.char-counter {
  font-size: 3px;
  fill: #888;
  pointer-events: none;
}

/* rendered values */
.field-value {
  font-size: 4px;
  font-family: sans-serif;
  fill: #000;
  pointer-events: none;
}

.field-value[data-field][text-anchor="middle"] {
  font-weight: bold;
}

/* signature */
.signature {
  pointer-events: none;
}
  
.formula-target {
    stroke: #007bff !important;
    stroke-width: 2.5 !important;
    fill: rgba(0,123,255,0.08);
}

.formula-source {
    stroke: #28a745 !important;
    stroke-width: 2.2 !important;
    fill: rgba(40,167,69,0.08);
}

.formula-target,
.formula-source {
    vector-effect: non-scaling-stroke;
}

/* ---------- drop hint ---------- */

#dropHint {
  text-align: center;
  color: #666;
  margin-top: 40px;
  font-size: 14px;
}

/* ---------- buttons ---------- */

button {
  padding: 6px 12px;
  font-size: 14px;
  cursor: pointer;
}

#pageIndicator {
  margin: 0 10px;
  font-size: 14px;
  color: #333;
}

/* ---------- print ---------- */

@media print {
  #toolbar { display: none; }
  .page { box-shadow: none; padding: 0; }
}

</style>
</head>

<body>

<h2>eForm Viewer Prototype</h2>

<div id="toolbar">
  <input type="file" id="fileInput" accept=".eform">
  <button id="saveBtn">Save Form</button>

  <input type="file" id="signatureInput" accept=".svg" style="display:none">
  <button id="applySignatureBtn">Apply Signature</button>
    
  <button id="prevPageBtn">◀</button>
  <span id="pageIndicator">Page 1 / 1</span>
  <button id="nextPageBtn">▶</button>
</div>

<div id="container"></div>

<div id="dropHint">
  Drop an <strong>.eform</strong> file anywhere on this page to open it.
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="viewer.js"></script>

</body>
</html>
