<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>eForm Viewer (Prototype)</title>

<link rel="icon" type="image/svg+xml" href="../../icon/eForm_min.svg">

<style>

/* ---------- layout ---------- */

body {
  font-family: sans-serif;
  margin: 0;
  background: #e9ecef;
}

h2 {
  margin: 20px;
}

/* ---------- toolbar ---------- */

#toolbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;

  background: white;
  padding: 12px 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);

  display: flex;
  gap: 10px;
  align-items: center;

  z-index: 1000;
}

/* ---------- viewer ---------- */

#container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
  gap: 30px;
}

/* ---------- page ---------- */

.page {
  background: white;
  padding: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

/* ---------- SVG scaling ---------- */

.page svg {
  width: 850px;
  max-width: 100%;
  height: auto;
  display: block;
}

/* ---------- field styling ---------- */

[data-eform-field] rect {
  pointer-events: all;
  stroke: black;
}

[data-eform-field]:hover rect {
  stroke: #0066ff;
}

/* ---------- drop hint ---------- */

#dropHint {
  text-align: center;
  color: #666;
  margin-top: 40px;
  font-size: 14px;
}

/* ---------- buttons ---------- */

button {
  padding: 6px 12px;
  font-size: 14px;
  cursor: pointer;
}

/* ---------- print ---------- */

@media print {
  #toolbar { display: none; }
  .page { box-shadow: none; padding: 0; }
}

</style>
</head>

<body>

<h2>eForm Viewer Prototype</h2>

<div id="toolbar">
  <input type="file" id="fileInput" accept=".eform">
  <button id="saveBtn">Save Form</button>

  <input type="file" id="signatureInput" accept=".svg" style="display:none">
  <button id="applySignatureBtn">Apply Signature</button>
</div>

<div id="container"></div>

<div id="dropHint">
  Drop an <strong>.eform</strong> file anywhere on this page to open it.
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="viewer.js"></script>

</body>
</html>
