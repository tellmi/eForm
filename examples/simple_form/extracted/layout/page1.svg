&lt;svg xmlns="http://www.w3.org/2000/svg"
     width="210mm"
     height="297mm"
     viewBox="0 0 210 297"&gt;

  &lt;style&gt;
    text { font-family: sans-serif; font-size: 4mm; }
    .title { font-size: 6mm; font-weight: bold; }
    .field { fill: none; stroke: black; stroke-width: 0.3; }
  &lt;/style&gt;

  &lt;!-- Title --&gt;
  &lt;text class="title" x="20" y="30"&gt;Example eForm – Simple Registration&lt;/text&gt;

  &lt;!-- First name --&gt;
  &lt;text x="20" y="60"&gt;First name&lt;/text&gt;
  &lt;rect class="field"
        data-eform-field="firstname"
        x="70"
        y="65"
        width="100"
        height="10"/&gt;

  &lt;!-- Last name --&gt;
  &lt;text x="20" y="90"&gt;Last name&lt;/text&gt;
  &lt;rect class="field"
        data-eform-field="lastname"
        x="70"
        y="95"
        width="100"
        height="10"/&gt;

  &lt;!-- Birth date --&gt;
  &lt;text x="20" y="120"&gt;Birth date&lt;/text&gt;
  &lt;rect class="field"
        data-eform-field="birthdate"
        x="70"
        y="125"
        width="60"
        height="10"/&gt;

  &lt;!-- Birth country --&gt;
  &lt;text x="20" y="150"&gt;Birth country&lt;/text&gt;
  &lt;rect class="field"
        data-eform-field="birthcountry"
        x="70"
        y="155"
        width="100"
        height="10"/&gt;

&lt;/svg&gt;
