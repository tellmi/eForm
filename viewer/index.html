<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>eForm Viewer (Prototype)</title>

<style>

/* ---------- layout ---------- */

body {
  font-family: sans-serif;
  margin: 0;
  background: #e9ecef;
}

h2 {
  margin: 20px;
}

/* ---------- toolbar ---------- */

#toolbar {
  background: white;
  padding: 12px 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  display: flex;
  gap: 10px;
  align-items: center;
}

/* ---------- viewer ---------- */

#container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
  gap: 30px;
}

/* ---------- page ---------- */

.page {
  background: white;
  padding: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

/* ---------- SVG scaling ---------- */

.page svg {
  width: 850px;
  max-width: 100%;
  height: auto;
  display: block;
}

/* ---------- field styling ---------- */

.field {
  fill: none;
  stroke: black;
  stroke-width: 1;
  pointer-events: none;
}

[data-eform-field] rect {
  pointer-events: all;
}

[data-eform-field]:hover rect {
  stroke: #0066ff;
}

/* ---------- drop hint ---------- */

#dropHint {
  text-align: center;
  color: #666;
  margin-top: 40px;
  font-size: 14px;
}

/* ---------- buttons ---------- */

button {
  padding: 6px 12px;
  font-size: 14px;
  cursor: pointer;
}

input[type="text"] {
  border: 1px solid #333;
  border-radius: 3px;
  font-family: sans-serif;
}

/* ---------- print ---------- */

@media print {

  body {
    background: white;
  }

  #toolbar {
    display: none;
  }

  #container {
    padding: 0;
  }

  .page {
    box-shadow: none;
    padding: 0;
  }

  .page svg {
    width: 210mm;
    height: 297mm;
  }

}

</style>
</head>

<body>

<h2>eForm Viewer Prototype</h2>

<div id="toolbar">
  <input type="file" id="fileInput" accept=".eform">
  <button id="saveBtn">Save Form</button>
</div>

<div id="container"></div>

<div id="dropHint">
  Drop an <strong>.eform</strong> file anywhere on this page to open it.
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="viewer.js"></script>

<script>

/* -----------------------------------
   URL loading trick
   viewer.html?file=form.eform
----------------------------------- */

const params = new URLSearchParams(window.location.search);
const fileParam = params.get("file");

if (fileParam)
{
  fetch(fileParam)
    .then(r => r.blob())
    .then(blob =>
    {
      const file = new File([blob], fileParam);
      loadEForm(file);
    })
    .catch(err =>
    {
      console.warn("Could not load eForm:", err);
    });
}

</script>

</body>
</html>
